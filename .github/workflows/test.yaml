name: Test

on:
  push:
    branches:
      - "**"
      - "!gh-pages"
      - "!stage*"
    paths:
      - "src/datajoint/**"
      - "tests/**"
      - "pyproject.toml"
      - "pixi.lock"
      - ".github/workflows/test.yaml"
  pull_request:
    branches:
      - "**"
      - "!gh-pages"
      - "!stage*"
    paths:
      - "src/datajoint/**"
      - "tests/**"
      - "pyproject.toml"
      - "pixi.lock"
      - ".github/workflows/test.yaml"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Exercise both ends of the supported range (requires-python
        # >=3.10,<3.15). The version-pinned pixi environments are defined in
        # pyproject.toml under [tool.pixi.environments].
        environment: [test-py310, test-py314]
    name: test (${{ matrix.environment }})
    steps:
      - uses: actions/checkout@v4

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.9.3
        with:
          cache: true
          locked: false
          environments: ${{ matrix.environment }}

      - name: Run tests
        run: pixi run -e ${{ matrix.environment }} test-cov

  # Unit tests run without containers (faster feedback)
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.9.3
        with:
          cache: true
          locked: false

      - name: Run unit tests
        run: pixi run -e test pytest tests/unit -v
